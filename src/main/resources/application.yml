spring:
  application:
    name: dispute-resolution-system
  datasource:
    url: jdbc:postgresql://localhost:5432/disputedb
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
